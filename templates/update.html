<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Todo - MyTodo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
</head>

<body style="background-color:#f8f9fa;">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-check2-square"></i> MyTodo
            </a>
        </div>
    </nav>

    <!-- Update Card -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4">

                        <h2 class="mb-4 text-center">
                            <i class="bi bi-pencil-square"></i> Update Task
                        </h2>

                        <form method="POST">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Task Title</label>
                                <input type="text" class="form-control" name="title" value="{{ todo.title }}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Description</label>
                                <textarea class="form-control" name="desc" rows="4">{{ todo.desc }}</textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success"
                                    onclick="return confirm('Save changes to this task?')">
                                    <i class="bi bi-check-circle-fill"></i> Update
                                </button>

                                <a href="/" class="btn btn-outline-dark">
                                    <i class="bi bi-arrow-left"></i> Back
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    //  Dark mode
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");

        localStorage.setItem("darkMode",
            document.body.classList.contains("dark-mode"));
    }

    // Persist mode
    window.onload = () => {
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
        }
    };

    //  Toast on update
    const form = document.querySelector("form");
    if(form){
        form.addEventListener("submit", () => {
            let toastEl = document.getElementById("toastMsg");
            let toast = new bootstrap.Toast(toastEl);
            toast.show();
        });
    }

    //  Character counter
    const textarea = document.querySelector("textarea");
    if(textarea){
        let counter = document.createElement("small");
        counter.classList.add("text-muted");
        textarea.after(counter);

        textarea.addEventListener("input", () => {
            counter.innerText = textarea.value.length + " characters";
        });
    }

    //  Auto focus first input
    document.querySelector("input").focus();

</script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
